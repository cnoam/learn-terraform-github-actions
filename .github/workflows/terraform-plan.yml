name: "Terraform Plan"

on:
  pull_request:

permissions:
  # so GitHub can check out this repo using the default github.token
  contents: read
  pull-requests: write
  id-token: write
      
env:
  #TF_CLOUD_ORGANIZATION: "noam_learning"
  #TF_API_TOKEN: "${{ secrets.TF_TOKEN }}"
  #TF_WORKSPACE: "gh-actions-demo"
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN }}  # HCP state/locking
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  #CONFIG_DIRECTORY: "./"

jobs:
  terraform:
    environment: "testing_tf"
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -no-color -input=false
        
